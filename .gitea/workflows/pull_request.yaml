name: Pull Request Pipeline

on:
  pull_request:

jobs:
  lint:
    name: "Lint Code"
    runs-on: ubuntu-latest
    container:
      image: node:22
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESlint
        run: pnpm lint
