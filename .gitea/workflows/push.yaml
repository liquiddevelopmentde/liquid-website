name: Push Pipeline

on:
  push:
    branches:
      - "development"
      - "main"

jobs:
  format:
    name: "Format Code"
    runs-on: ubuntu-latest
    container:
      image: node:22
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.BOT_TOKEN }}
          ref: ${{ gitea.ref_name }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run eslint
        run: pnpm lint:fix

      - name: Run Prettier
        run: pnpm format

      - name: Commit changes
        env:
          GITEA_TOKEN: ${{ secrets.BOT_TOKEN }}
          BRANCH_NAME: ${{ gitea.ref_name }}
        run: |
          git fetch origin "$BRANCH_NAME"
          git checkout "$BRANCH_NAME"
          
          if [ -n "$(git status --porcelain)" ]; then
            git config --global user.name "Gitea Actions [bot]"
            git config --global user.email "actions@yannick-weigert.de"
            git add .
            git commit -m "Auto-format code [skip ci]"
            git pull --rebase --autostash origin "$BRANCH_NAME"
            git push origin HEAD:$BRANCH_NAME
          else
            echo "No changes to commit"
          fi

      - name: Verify format
        run: pnpm lint

  build-pnpm:
    name: "Build with pnpm"
    runs-on: ubuntu-latest
    container:
      image: node:22
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.BOT_TOKEN }}
          ref: ${{ gitea.ref_name }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build project
        run: pnpm build

  build-docker:
    name: "Build with Docker"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.BOT_TOKEN }}
          ref: ${{ gitea.ref_name }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build project
        run: docker compose build

